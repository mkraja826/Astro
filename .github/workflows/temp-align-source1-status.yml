name: Temporary align Source 1 status

on:
  push:
    branches:
      - validation/migrate-jhora-source1-v1

permissions:
  contents: write

jobs:
  align:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validation/migrate-jhora-source1-v1
      - name: Align tests and documentation
        shell: python
        run: |
          from pathlib import Path

          replacements = {
              "tests/test_classical_validation.py": [
                  (
                      'assert payload["committed_external_snapshot_count"] == 0',
                      'assert payload["committed_external_snapshot_count"] == 1',
                  ),
              ],
              "app/engine/classical_validation.py": [
                  (
                      '"No third-party software snapshots are committed in version 1.0.0.",',
                      '"One approved external snapshot is committed; Source 2 is still required for its case.",',
                  ),
              ],
              "README.md": [
                  (
                      "remains zero approved snapshots and zero externally validated cases until exports\nfrom two independent Jyotisha programs per case are reviewed and committed.",
                      "now includes one approved Jagannatha Hora 8.0 snapshot for the Nagarjuna Sagar\ncase, while zero cases are fully externally validated. A second independent source is\nstill required for that case, and two approved sources remain required for every\nother frozen case.",
                  ),
              ],
              "docs/EXTERNAL_VALIDATION_EVIDENCE_V1.md": [
                  (
                      "Version 1.0.0 intentionally begins with zero records, zero approved snapshots, and\nzero externally validated cases. The manifest framework is complete; the evidence\ncollection program is not.",
                      "Version 1.0.0 contains one approved Jagannatha Hora 8.0 snapshot for\n`gc_india_nagarjuna_sagar_1998`. That case still requires a second independent\napproved source, so the current result remains zero externally validated cases.\nThe manifest framework is complete; the broader evidence collection program is not.",
                  ),
              ],
              "docs/GOLDEN_CHART_VALIDATION_V1.md": [
                  (
                      '  "committed_external_snapshot_count": 0,\n  "externally_validated_case_count": 0,',
                      '  "committed_external_snapshot_count": 1,\n  "approved_external_snapshot_count": 1,\n  "externally_validated_case_count": 0,',
                  ),
              ],
          }

          for filename, edits in replacements.items():
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in edits:
                  count = text.count(old)
                  if count != 1:
                      raise SystemExit(f"Expected exactly one match in {filename}, found {count}: {old}")
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")

          Path(".github/workflows/temp-align-source1-status.yml").unlink()
      - name: Commit aligned status
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/engine/classical_validation.py tests/test_classical_validation.py README.md docs/GOLDEN_CHART_VALIDATION_V1.md docs/EXTERNAL_VALIDATION_EVIDENCE_V1.md .github/workflows/temp-align-source1-status.yml
          git commit -m "validation: align approved Source 1 status"
          git push origin HEAD:validation/migrate-jhora-source1-v1
