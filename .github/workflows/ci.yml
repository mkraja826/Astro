name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache JPL DE440s
        id: cache-jpl
        uses: actions/cache@v4
        with:
          path: app/data/jpl/de440s.bsp
          key: jpl-de440s-v1

      - name: Download JPL DE440s
        if: steps.cache-jpl.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/data/jpl
          curl --fail --location --retry 3 \
            https://naif.jpl.nasa.gov/pub/naif/generic_kernels/spk/planets/de440s.bsp \
            --output app/data/jpl/de440s.bsp
          test -s app/data/jpl/de440s.bsp

      - name: Install project
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Capture test report
        run: |
          set +e
          pytest -vv > pytest-report.txt 2>&1
          echo $? > pytest-exit-code.txt
          exit 0

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: jpl-baseline-pytest-report
          path: |
            pytest-report.txt
            pytest-exit-code.txt

      - name: Fail on test errors
        run: |
          code=$(cat pytest-exit-code.txt)
          test "$code" -eq 0
