name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ruff
        run: python3 -m pip install --quiet "ruff>=0.9,<1.0"

      - name: Lint
        run: ruff check . --output-format=json > ruff-report.json

      - name: Upload Ruff report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ruff-report
          path: ruff-report.json
          retention-days: 1

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache JPL DE440s
        id: cache-jpl
        uses: actions/cache@v4
        with:
          path: app/data/jpl/de440s.bsp
          key: jpl-de440s-c1c7feeab882263fc493a9d5a5b2ddd71b54826cdf65d8d17a76126b260a49f2

      - name: Install verified JPL DE440s
        run: |
          python scripts/download_jpl_kernel.py \
            --destination app/data/jpl/de440s.bsp \
            --sha256 c1c7feeab882263fc493a9d5a5b2ddd71b54826cdf65d8d17a76126b260a49f2

      - name: Install project
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -e ".[dev]"

      - name: Test
        run: pytest --junitxml=pytest-report.xml

      - name: Upload Pytest report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml
          retention-days: 1

      - name: Build production image
        run: docker build --tag jyothisyam-api:ci .

      - name: Smoke test production image
        env:
          ASTRO_CI_API_KEY: astro-ci-service-key-0123456789abcdef
          ASTRO_CI_CONSUMER_ID: 11111111-1111-4111-8111-111111111111
        run: |
          docker run --detach --name jyothisyam-api-ci -p 18080:8080 \
            --env JYOTHISYAM_API_KEY="$ASTRO_CI_API_KEY" \
            --env JYOTHISYAM_USAGE_BACKEND=memory \
            --env JYOTHISYAM_REQUIRE_USAGE_GUARD=false \
            --env JYOTHISYAM_REQUESTS_PER_MINUTE=2 \
            --env JYOTHISYAM_MAX_REQUEST_BODY_BYTES=64 \
            jyothisyam-api:ci
          trap 'docker logs jyothisyam-api-ci || true; docker rm --force jyothisyam-api-ci || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              --header "X-Request-ID: ci-readiness-001" \
              --dump-header /tmp/readiness-headers.txt \
              http://127.0.0.1:18080/health/ready \
              --output /tmp/readiness.json; then
              cat /tmp/readiness-headers.txt
              cat /tmp/readiness.json
              grep --ignore-case '^x-request-id: ci-readiness-001' /tmp/readiness-headers.txt
              grep '"runtime"' /tmp/readiness.json
              grep '"usage"' /tmp/readiness.json
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Production container did not become ready" >&2
              exit 1
            fi
            sleep 1
          done

          docs_status=$(curl --silent --output /tmp/docs.html \
            --write-out '%{http_code}' \
            http://127.0.0.1:18080/docs)
          test "$docs_status" = "404"

          openapi_status=$(curl --silent --output /tmp/openapi.json \
            --write-out '%{http_code}' \
            http://127.0.0.1:18080/openapi.json)
          test "$openapi_status" = "404"

          unauthenticated_status=$(curl --silent --output /tmp/unauthenticated.json \
            --write-out '%{http_code}' \
            http://127.0.0.1:18080/v1/classical/varahamihira_v1/profile)
          test "$unauthenticated_status" = "401"
          cat /tmp/unauthenticated.json

          missing_consumer_status=$(curl --silent --output /tmp/missing-consumer.json \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $ASTRO_CI_API_KEY" \
            http://127.0.0.1:18080/v1/classical/varahamihira_v1/profile)
          test "$missing_consumer_status" = "400"
          grep 'CONSUMER_ID_REQUIRED' /tmp/missing-consumer.json

          curl --fail --silent --show-error \
            --header "Authorization: Bearer $ASTRO_CI_API_KEY" \
            --header "X-Astro-Consumer-ID: $ASTRO_CI_CONSUMER_ID" \
            --header "X-Request-ID: ci-metered-001" \
            --dump-header /tmp/metered-headers.txt \
            http://127.0.0.1:18080/v1/classical/varahamihira_v1/profile \
            --output /tmp/authenticated.json
          cat /tmp/metered-headers.txt
          cat /tmp/authenticated.json
          grep --ignore-case '^x-ratelimit-limit: 2' /tmp/metered-headers.txt
          grep --ignore-case '^x-astro-credit-cost: 1' /tmp/metered-headers.txt

          second_status=$(curl --silent --output /tmp/second.json \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $ASTRO_CI_API_KEY" \
            --header "X-Astro-Consumer-ID: $ASTRO_CI_CONSUMER_ID" \
            --header "X-Request-ID: ci-metered-002" \
            http://127.0.0.1:18080/v1/classical/varahamihira_v1/profile)
          test "$second_status" = "200"

          limited_status=$(curl --silent --output /tmp/limited.json \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $ASTRO_CI_API_KEY" \
            --header "X-Astro-Consumer-ID: $ASTRO_CI_CONSUMER_ID" \
            --header "X-Request-ID: ci-metered-003" \
            http://127.0.0.1:18080/v1/classical/varahamihira_v1/profile)
          test "$limited_status" = "429"
          grep 'RATE_LIMIT_EXCEEDED' /tmp/limited.json

          python - <<'PY'
          from pathlib import Path
          Path('/tmp/oversized.bin').write_bytes(b'x' * 65)
          PY
          oversized_status=$(curl --silent --output /tmp/oversized.json \
            --write-out '%{http_code}' \
            --request POST \
            --header 'Content-Type: application/octet-stream' \
            --data-binary @/tmp/oversized.bin \
            http://127.0.0.1:18080/v1/classical/varahamihira_v1/profile)
          test "$oversized_status" = "413"
          grep 'REQUEST_BODY_TOO_LARGE' /tmp/oversized.json
