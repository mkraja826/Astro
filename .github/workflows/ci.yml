name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache JPL DE440s
        id: cache-jpl
        uses: actions/cache@v4
        with:
          path: app/data/jpl/de440s.bsp
          key: jpl-de440s-c1c7feeab882263fc493a9d5a5b2ddd71b54826cdf65d8d17a76126b260a49f2

      - name: Install verified JPL DE440s
        run: |
          python scripts/download_jpl_kernel.py \
            --destination app/data/jpl/de440s.bsp \
            --sha256 c1c7feeab882263fc493a9d5a5b2ddd71b54826cdf65d8d17a76126b260a49f2

      - name: Install project
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Build production image
        run: docker build --tag jyothisyam-api:ci .

      - name: Smoke test production image
        run: |
          docker run --detach --name jyothisyam-api-ci -p 18080:8080 jyothisyam-api:ci
          trap 'docker logs jyothisyam-api-ci || true; docker rm --force jyothisyam-api-ci || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:18080/health/ephemeris \
              --output /tmp/ephemeris-health.json; then
              cat /tmp/ephemeris-health.json
              exit 0
            fi
            sleep 1
          done

          echo "Production container did not become ready" >&2
          exit 1
