name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache JPL DE440s
        id: cache-jpl
        uses: actions/cache@v4
        with:
          path: app/data/jpl/de440s.bsp
          key: jpl-de440s-v1

      - name: Download JPL DE440s
        if: steps.cache-jpl.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/data/jpl
          curl --fail --location --retry 3 \
            https://naif.jpl.nasa.gov/pub/naif/generic_kernels/spk/planets/de440s.bsp \
            --output app/data/jpl/de440s.bsp
          test -s app/data/jpl/de440s.bsp

      - name: Install project
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -e ".[dev]"

      - name: Generate JPL golden baselines
        run: python scripts/generate_jpl_golden_baselines.py

      - name: Commit generated baselines
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet -- app/data/validation/jpl_de440s_v1; then
            echo "Golden baselines are already current."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/data/validation/jpl_de440s_v1
            git commit -m "data: freeze JPL DE440s golden baselines"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
