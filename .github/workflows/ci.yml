name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -e ".[dev]"

      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          ruff check . > ruff-output.txt 2>&1
          code=$?
          cat ruff-output.txt
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload lint diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: ruff-output
          path: ruff-output.txt

      - name: Fail when lint fails
        if: steps.lint.outputs.code != '0'
        run: exit 1

      - name: Test
        if: steps.lint.outputs.code == '0'
        run: pytest
