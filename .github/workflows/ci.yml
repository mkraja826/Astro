name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        id: tests
        shell: bash
        run: |
          set +e
          pytest -vv > test-output.txt 2>&1
          test_status=$?
          cat test-output.txt
          echo "status=$test_status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: test-output.txt
          retention-days: 3

      - name: Fail when tests fail
        if: steps.tests.outputs.status != '0'
        run: exit 1
