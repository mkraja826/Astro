name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Capture test report
        id: pytest
        shell: bash
        run: |
          set +e
          pytest > pytest-output.txt 2>&1
          code=$?
          cat pytest-output.txt
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt

      - name: Fail on test errors
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
